name: Build and Test perftest on Ubuntu 24.04 with CUDA 12.8

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA repository
        run: |
          wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-ubuntu2404.pin
          sudo mv cuda-ubuntu2404.pin /etc/apt/preferences.d/cuda-repository-pin-600
          wget https://developer.download.nvidia.com/compute/cuda/12.8.0/local_installers/cuda-repo-ubuntu2404-12-8-local_12.8.0-545.23.08-1_amd64.deb
          sudo dpkg -i cuda-repo-ubuntu2404-12-8-local_12.8.0-545.23.08-1_amd64.deb
          sudo cp /var/cuda-repo-ubuntu2404-12-8-local/cuda-*-keyring.gpg /usr/share/keyrings/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libibverbs-dev \
            librdmacm-dev \
            libibumad-dev \
            libpci-dev \
            cuda-toolkit-12-8 \
            cuda-drivers

      - name: Set up CUDA environment
        run: |
          echo 'export PATH=/usr/local/cuda-12.8/bin:${PATH}' >> $GITHUB_ENV
          echo 'export LD_LIBRARY_PATH=/usr/local/cuda-12.8/lib64:${LD_LIBRARY_PATH}' >> $GITHUB_ENV

      - name: Run autogen.sh
        run: ./autogen.sh

      - name: Configure the build
        run: ./configure CUDA_H_PATH=/usr/local/cuda/include/cuda.h

      - name: Build perftest
        run: make
    
      - name: Install perftest
        run: sudo make install 