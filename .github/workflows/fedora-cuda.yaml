name: Build and Test perftest on latest Fedora with latest CUDA

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: fedora-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA repository
        run: |
          sudo dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/fedora38/x86_64/cuda-fedora38.repo
          sudo dnf -y module install nvidia-driver:latest-dkms

      - name: Install dependencies
        run: |
          sudo dnf update -y
          sudo dnf install -y \
            gcc \
            gcc-c++ \
            make \
            autoconf \
            automake \
            libtool \
            pkgconfig \
            rdma-core-devel \
            libibverbs-devel \
            librdmacm-devel \
            libibumad-devel \
            pciutils-devel \
            cuda-toolkit \
            cuda-drivers

      - name: Set up CUDA environment
        run: |
          echo 'export PATH=/usr/local/cuda-12.8/bin:${PATH}' >> $GITHUB_ENV
          echo 'export LD_LIBRARY_PATH=/usr/local/cuda-12.8/lib64:${LD_LIBRARY_PATH}' >> $GITHUB_ENV

      - name: Run autogen.sh
        run: ./autogen.sh

      - name: Configure the build
        run: ./configure CUDA_H_PATH=/usr/local/cuda/include/cuda.h

      - name: Build perftest
        run: make
    
      - name: Install perftest
        run: sudo make install 